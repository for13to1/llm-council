<div class="sidebar">
    <div class="sidebar-header">
        <h1>LLM Council</h1>
        <button class="new-conversation-btn" onclick="window.location.href='/new'" type="button">+ New Conversation</button>
    </div>
    <div class="conversation-list">
        {% if conversations %}
            {% for conv in conversations %}
            <div class="conversation-item {% if conv.id == active_conversation_id %}active{% endif %}" onclick="window.location.href='/conversations/{{ conv.id }}'" data-id="{{ conv.id }}">
                <div class="conversation-title" id="sidebar-title-{{ conv.id }}">{{ conv.title or 'New Conversation' }}</div>
                <div class="conversation-meta">{{ conv.message_count }} messages</div>
            </div>
            {% endfor %}
        {% else %}
            <div class="no-conversations">No conversations yet</div>
        {% endif %}
    </div>
</div>
